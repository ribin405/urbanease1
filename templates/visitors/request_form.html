{% extends 'base.html' %}

{% block title %}Visitor Request - UrbanEase{% endblock %}

{% block auth_content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">
            <i class="fa-solid fa-user-plus"></i> Visitor Request
        </div>
        <div class="auth-subtitle">
            Submit visitor details for review
        </div>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn auth-btn w-100">
                Submit Request
            </button>
        </form>
    </div>
</div>
{% endblock %}
